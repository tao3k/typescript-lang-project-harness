name: Release provider binary

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish assets to"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-apple-darwin
    env:
      BINARY: ts-harness
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
      TARGET: ${{ matrix.target }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Ensure release tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "release tag must start with v: $RELEASE_TAG" >&2; exit 2 ;;
          esac
          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build harness
        run: npm run build

      - name: Package provider binary
        shell: bash
        run: |
          set -euo pipefail
          rm -rf package
          mkdir -p package
          cp -R dist package/dist
          cp package.json package-lock.json package/
          (cd package && npm ci --omit=dev --ignore-scripts)
          cat > "package/${BINARY}" <<'SH'
          #!/bin/sh
          set -eu
          ROOT="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          exec node "$ROOT/dist/src/cli/main.js" "$@"
          SH
          chmod +x "package/${BINARY}" package/dist/src/cli/main.js
          asset="${BINARY}-${TARGET}.tar.gz"
          tar -czf "$asset" -C package .
          python - "$asset" <<'PY'
          import hashlib
          import pathlib
          import sys

          asset = pathlib.Path(sys.argv[1])
          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          pathlib.Path(f"{asset}.sha256").write_text(f"{digest}  {asset.name}\n")
          PY

      - name: Publish release assets
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" --verify-tag --title "$RELEASE_TAG" --notes "Provider binary release $RELEASE_TAG" \
            || gh release view "$RELEASE_TAG" >/dev/null
          gh release upload "$RELEASE_TAG" "${BINARY}-${TARGET}.tar.gz" "${BINARY}-${TARGET}.tar.gz.sha256" --clobber
